<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudarshan Sheets AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      background: #0f1117;
      color: #e8eaed;
      font-family: 'Google Sans', -apple-system, sans-serif;
      padding: 0;
    }

    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-text h1 { font-size: 14px; font-weight: 600; }
    .header-text p { font-size: 11px; opacity: 0.8; }

    .status-section { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .status-label { font-size: 11px; color: #9aa0a6; }

    .status-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .badge-green { background: rgba(52,168,83,0.15); color: #81c995; border: 1px solid rgba(52,168,83,0.3); }
    .badge-red { background: rgba(234,67,53,0.15); color: #f28b82; border: 1px solid rgba(234,67,53,0.3); }
    .badge-yellow { background: rgba(249,171,0,0.15); color: #fdd663; border: 1px solid rgba(249,171,0,0.3); }

    .actions { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #1e2130;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      color: #e8eaed;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      width: 100%;
    }

    .action-btn:hover {
      background: #252836;
      border-color: rgba(26,115,232,0.3);
    }

    .action-btn .icon { font-size: 16px; flex-shrink: 0; }
    .action-btn .text { flex: 1; }
    .action-btn .text small { display: block; font-size: 10px; color: #5f6368; margin-top: 1px; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .plan-info { font-size: 10px; color: #5f6368; }
    .plan-name { color: #f9ab00; }

    .upgrade-btn {
      font-size: 10px;
      color: #8ab4f8;
      background: rgba(138,180,248,0.08);
      border: 1px solid rgba(138,180,248,0.2);
      padding: 3px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .upgrade-btn:hover { background: rgba(138,180,248,0.15); }

    .not-sheets {
      padding: 20px 16px;
      text-align: center;
    }

    .not-sheets .emoji { font-size: 32px; margin-bottom: 8px; }
    .not-sheets p { font-size: 12px; color: #9aa0a6; line-height: 1.5; }

    .open-sheets-btn {
      margin-top: 12px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✨</div>
    <div class="header-text">
      <h1>Sudarshan Sheets AI</h1>
      <p>AI Spreadsheet Copilot</p>
    </div>
  </div>

  <div id="main-content"></div>

  <script src="popup.js"></script>
</body>
</html>
